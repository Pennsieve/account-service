                $ref: '#/components/schemas/permissionActionResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/permissions/teams/{teamId}:
    delete:
      summary: Revoke access from a team
      description: |
        Revokes access from a specific team for a compute node.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
        
        **Note**: This operation only applies to compute nodes that belong to a workspace (organization).
        Independent compute nodes do not support sharing.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: revokeTeamAccess
      security:
        - token_auth: [ ]
      tags:

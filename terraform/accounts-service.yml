        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/user-quotas/{userId}:
    put:
      summary: Create or replace the chat & workflow LLM quota for a user on this compute node
      description: |
        Writes the quota row for (computeNodeId, userId). Pass the literal string
        `__default__` as `userId` to set the node-wide default applied when no
        per-user override exists.

        Each cost-axis field is independent — omit (or set to null) any axis to
        leave that axis uncapped. The per-workflow cap is forwarded to the LLM
        governor as the per-execution budget when this user kicks off a workflow.

        **Permissions:** Node owner or workspace administrator on public accounts.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: putChatUserQuota
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: |
            The Pennsieve user node id, or the literal string `__default__` to
            set the node-wide default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/chatUserQuotaRequest'
      responses:
        '200':
          description: Quota saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/chatUserQuota'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      summary: Get the chat & workflow LLM quota for a user on this compute node
      description: |
        Returns the raw quota row for (computeNodeId, userId), or 404 if none
        is set for that pair. A 404 does NOT mean "no limit applies" — the
        user still falls back to the node `__default__` row, then to a
        platform safety cap. Use `/effective` to see what's actually enforced.

        Pass `__default__` as `userId` to retrieve the node-wide default
        (owner-only).

        Pass `me` as `userId` to retrieve the caller's own row without
        having to know your own user node id.

        **Permissions:** Node owner / workspace admin can read any row; the
        caller can also read their own row (`userId` matches their JWT or
        `me`) provided they have any access to the node.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getChatUserQuota
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Pennsieve user node id, the literal `me`, or `__default__`.
      responses:
        '200':
          description: Quota row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/chatUserQuota'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      summary: Remove the chat & workflow LLM quota for a user on this compute node
      description: |
        Deletes the quota row for (computeNodeId, userId). After deletion the user
        falls back to the node's `__default__` row (if any), then to "no limit" on
        each uncapped axis.

        **Permissions:** Node owner or workspace administrator on public accounts.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: deleteChatUserQuota
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Pennsieve user node id, or `__default__`.
      responses:
        '200':
          description: Quota deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/user-quotas/{userId}/effective:
    get:
      summary: Get the *resolved* chat & workflow LLM quota plus current spend
      description: |
        Returns the limits actually enforced for (computeNodeId, userId),
        with per-axis source attribution and current per-period spend.
        Mirrors the resolution chat-service runs at dispatch time:

          per-user row → node `__default__` row → platform safety cap

        axis-by-axis (any unset axis falls through to the next tier). Use
        this rather than the raw `/user-quotas/{userId}` GET when you want
        to know what's actually applied — the raw GET returns 404 when no
        per-user override exists, which is misleading because the user is
        still bound by `__default__` and the safety cap.

        Pass `me` as `userId` to retrieve your own effective quota.

        **Permissions:** Node owner / workspace admin can read any user;
        the caller can also read their own effective quota.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getChatUserEffectiveQuota
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Pennsieve user node id, or the literal `me`.
      responses:
        '200':
          description: Resolved limits + current spend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/chatUserEffectiveQuota'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/user-usage/{userId}:
    get:
      summary: Get aggregate chat & workflow LLM usage for a user on this compute node
      description: |
        Returns the daily and/or monthly aggregate usage rows for (computeNodeId,
        userId). Useful for reporting and for explaining why a quota check might
        have failed.

        Pass `me` as `userId` to retrieve your own usage.

        **Permissions:** Node owner / workspace admin can read any user;
        the caller can also read their own usage.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getChatUserUsage
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Pennsieve user node id, or the literal `me`.
        - in: query
          name: period
          required: false
          schema:
            type: string
            enum: [day, month]
          description: |
            Restrict to just the daily or monthly aggregate. If omitted, both are
            returned.
        - in: query
          name: date
          required: false
          schema:
            type: string
          description: |
            Reference date as `YYYY-MM-DD`. The daily aggregate for this date and
            the monthly aggregate for the same month are returned. Defaults to today (UTC).
      responses:
        '200':
          description: Usage aggregates
          content:
            application/json:
              schema:
                type: object
                properties:
                  computeNodeId:
                    type: string
                  userId:
                    type: string
                  daily:
                    $ref: '#/components/schemas/chatUserUsage'
                  monthly:
                    $ref: '#/components/schemas/chatUserUsage'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /app-store/access:
    post:
      summary: Grant App Store ECR access
      description: |
        Grants all registered AWS accounts cross-account pull access to the
        private App Store ECR repository. All account principals are consolidated
        into a single repository policy statement.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: postAppStoreAccess
      x-internal: true
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      requestBody:
        description: Account requesting App Store access
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - accountType
              properties:
                accountId:
                  type: string
                  description: The AWS account ID requesting access
                accountType:
                  type: string
                  description: The type of the account
      responses:
        '200':
          description: Successfully updated ECR repository policy
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /role-policy:
    get:
      summary: Get IAM role policy
      description: |
        Returns the scoped IAM permission policy document that agents use when
        creating cross-account roles. This is the single source of truth for
        the set of AWS actions the provisioner requires.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getRolePolicy
      security:
        - token_auth: [ ]
      tags:
        - Account
      responses:
        '200':
          description: The IAM permission policy document
          content:
            application/json:
              schema:
                type: object
                description: An IAM policy document with Version and Statement fields
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /storage-nodes:
    post:
      summary: Create a storage node
      description: Creates a new storage node associated with an account.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: createStorageNode
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountUuid
                - name
                - storageLocation
                - providerType
              properties:
                accountUuid:
                  type: string
                organizationId:
                  type: string
                  description: |
                    Optional workspace for this storage node. When provided, the account must be
                    enabled for the workspace, the caller must be the account owner or a workspace
                    admin on a public+storage-enabled account, and the node is auto-attached to
                    that workspace. When omitted, only the account owner may create the node and
                    no workspace attachment is created (workspaces can be attached afterwards via
                    POST /storage-nodes/{id}/workspace).
                  example: "N:organization:050fae39-4412-43ef-a514-703ed8e299d5"
                name:
                  type: string
                description:
                  type: string
                storageLocation:
                  type: string
                  description: S3 bucket name, Azure container URL, or local path
                region:
                  type: string
                providerType:
                  type: string
                  enum: ["s3", "azure-blob", "local"]
      responses:
        '201':
          description: Storage node created
        '400':
          description: Bad request
        '403':
          description: Forbidden
    get:
      summary: List storage nodes
      description: Lists storage nodes filtered by organization_id or account_owner=true.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: listStorageNodes
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: organization_id
          in: query
          schema:
            type: string
        - name: account_owner
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of storage nodes
        '400':
          description: Bad request
  /storage-nodes/{id}:
    get:
      summary: Get a storage node
      description: Retrieves a single storage node by ID.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getStorageNode
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Storage node details
        '403':
          description: Forbidden
        '404':
          description: Not found
    patch:
      summary: Update a storage node
      description: Updates storage node fields (name, description, storageLocation, region, status).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: updateStorageNode
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: ["Enabled", "Disabled"]
      responses:
        '200':
          description: Storage node updated
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      summary: Delete a storage node
      description: Deletes a storage node. Account owner only.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: deleteStorageNode
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Storage node deleted
        '403':
          description: Forbidden
        '404':
          description: Not found
  /storage-nodes/{id}/update-config:
    post:
      summary: Update storage node infrastructure config
      description: |
        Re-applies the provisioner terraform on an existing storage node to update
        bucket configuration (CORS, lifecycle, encryption settings, etc.) without
        touching bucket contents. The bucket has prevent_destroy=true in terraform.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: updateStorageNodeConfig
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Config update initiated
        '403':
          description: Forbidden
        '404':
          description: Not found
  /storage-nodes/{id}/workspace:
    post:
      summary: Attach storage node to workspace
      description: Attaches a storage node to a workspace. Account owner only.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: attachStorageNodeToWorkspace
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspaceId
              properties:
                workspaceId:
                  type: string
                isDefault:
                  type: boolean
      responses:
        '201':
          description: Storage node attached to workspace
        '403':
          description: Forbidden
        '409':
          description: Already attached
    delete:
      summary: Detach storage node from workspace
      description: Detaches a storage node from a workspace. Account owner only.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: detachStorageNodeFromWorkspace
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspaceId
              properties:
                workspaceId:
                  type: string
      responses:
        '200':
          description: Storage node detached from workspace
        '403':
          description: Forbidden
        '409':
          description: Cannot detach - data exists
  /storage-nodes/{id}/impact:
    get:
      summary: Get detach impact
      description: Returns the impact of detaching a storage node (affected datasets, files, size).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getStorageNodeDetachImpact
      security:
        - token_auth: [ ]
      tags:
        - Storage Nodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: organization_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Impact analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: integer
                  files:
                    type: integer
                  totalSizeBytes:
                    type: integer
        '403':
          description: Forbidden
        '404':
          description: Not found
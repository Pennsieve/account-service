#file: noinspection MaybeTerraformTemplateInspection
openapi: 3.0.1
info:
  version: "3.0"
  title: Compute Resources API
  description: |
    This is the serverless Compute Resources API
  termsOfService: https://docs.pennsieve.io/page/pennsieve-terms-of-use
  contact:
    name: Pennsieve Support
    email: support@pennsieve.net
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api2.pennsieve.io/compute/resources
    description: Production server
  - url: https://api2.pennsieve.net/compute/resources
    description: Development server
externalDocs:
  description: Find more info here
  url: https://docs.pennsieve.io
tags:
  - name: Accounts Service
    description: Management of external accounts that can provide compute and/or storage capabilities.
    externalDocs:
      url: https://docs.pennsieve.io/reference
  - name: Compute Nodes
    description: Management of compute nodes for running analytical workflows on the Pennsieve platform.
components:
  x-amazon-apigateway-integrations:
    account-service:
      type: aws_proxy
      uri: ${account_service_lambda_arn}
      httpMethod: POST
      passthroughBehavior: when_no_match
      contentHandling: CONVERT_TO_TEXT
      payloadFormatVersion: 2.0
  securitySchemes:
    token_dataset_auth:
      type: "apiKey"
      name: "Unused"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.dataset_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
    token_auth:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
    token_workspace_auth:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.organization_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
  schemas:
    accountRequest:
      type: object
      properties:
        accountId:
          type: string
          description: the registered accountId
        accountType:
          type: string
          description: the type of account
        roleName:
          type: string
          description: the name of the created role
        externalId:
          type: string
          description: a unique identifier for the role
        name:
          type: string
          description: optional name for the account
        description:
          type: string
          description: optional description for the account
    postAccountsResponse:
      type: object
      properties:
        uuid:
          type: string
          description: the uuid of the created compute resource account
    accountsGetResponse:
      type: object
      properties:
        uuid:
          type: string
          description: the uuid of the compute resource account
        accountId:
          type: string
          description: the accountId of the compute resource account
        accountType:
          type: string
          description: the account type of compute resource account
        roleName:
          type: string
          description: the name of the role in the compute resource account
        externalId:
          type: string
          description: the generated externalId for compute resource account
        organizationId:
          type: string
          description: the organization of the role creator for the compute resource account
        userId:
          type: string
          description: the user that created the role for the compute resource account
        name:
          type: string
          description: the name of the account
        description:
          type: string
          description: the description of the account
        status:
          type: string
          enum: ["Enabled", "Paused"]
          description: the status of the account
    workspaceEnablementRequest:
      type: object
      properties:
        isPublic:
          type: boolean
          description: If true, workspace administrators can manage resources on this account (subject to enableCompute/enableStorage). If false, only the account owner can manage resources.
        enableCompute:
          type: boolean
          description: If true and isPublic is true, workspace administrators can create compute nodes on this account.
        enableStorage:
          type: boolean
          description: If true and isPublic is true, workspace administrators can create storage nodes on this account.
    workspaceEnablementResponse:
      type: object
      properties:
        uuid:
          type: string
          description: the uuid of the compute resource account
        workspaceId:
          type: string
          description: the workspace ID
        isPublic:
          type: boolean
          description: If true, workspace administrators can manage resources on this account (subject to enableCompute/enableStorage). If false, only the account owner can manage resources.
        enableCompute:
          type: boolean
          description: If true and isPublic is true, workspace administrators can create compute nodes on this account.
        enableStorage:
          type: boolean
          description: If true and isPublic is true, workspace administrators can create storage nodes on this account.
        createdAt:
          type: string
          format: date-time
          description: timestamp when the enablement was created
    computeNodeRequest:
      type: object
      required:
        - name
        - accountId
      properties:
        name:
          type: string
          description: Name of the compute node
        description:
          type: string
          description: Description of the compute node
        accountId:
          type: string
          description: UUID of the compute resource account to use
        provisionerImage:
          type: string
          description: Docker image for the provisioner
          default: pennsieve/compute-node-aws-provisioner
        provisionerImageTag:
          type: string
          description: Docker tag for the provisioner image
          default: latest
        organizationId:
          type: string
          description: Organization ID (workspace) this node belongs to. Empty for organization-independent nodes.
          example: "N:organization:050fae39-4412-43ef-a514-703ed8e299d5"
        deploymentMode:
          type: string
          enum: ["basic", "secure", "compliant"]
          description: Deployment mode controlling the infrastructure networking tier
          default: basic
        enableLLMAccess:
          type: boolean
          description: Enable LLM/Bedrock access for processors via the cost governor Lambda
          default: false
        llmBaaAcknowledged:
          type: boolean
          description: >
            Confirms that an AWS Business Associate Agreement (BAA) is in place for the target account.
            Required when enableLLMAccess is true and deploymentMode is "secure" or "compliant".
          default: false
        maxGpuInstances:
          type: integer
          description: Maximum number of GPU EC2 instances in the Auto Scaling Group. Set to 0 to disable GPU support.
          default: 2
          minimum: 0
        gpuTier:
          type: string
          description: "GPU instance tier: small (T4 16GB), medium (L4 24GB), large (A10G 24GB), xlarge (L40S 48GB)"
          default: small
          enum: [small, medium, large, xlarge]
        maxInteractiveSessions:
          type: integer
          description: Maximum concurrent interactive (Jupyter) sessions. Set to 0 to disable interactive sessions (no ALB / DNS cost). >0 enables the shared per-account ALB + delegated subdomain.
          default: 0
          minimum: 0
    computeNodeResponse:
      type: object
      properties:
        uuid:
          type: string
          description: UUID of the compute node
        name:
          type: string
          description: Name of the compute node
        description:
          type: string
          description: Description of the compute node
        queueUrl:
          type: string
          description: SQS Queue URL for the compute node
        account:
          type: object
          properties:
            uuid:
              type: string
              description: UUID of the account
            accountId:
              type: string
              description: AWS Account ID
            accountType:
              type: string
              description: Type of account (e.g., aws)
            ownerId:
              type: string
              description: User ID of the AWS/GCP account owner
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        organizationId:
          type: string
          description: Organization ID (workspace) this node belongs to. Empty for organization-independent nodes.
        ownerId:
          type: string
          description: User ID who created/owns this compute node
        identifier:
          type: string
          description: Unique identifier for the compute node
        workflowManagerTag:
          type: string
          description: Docker tag for the workflow manager
        provisionerImage:
          type: string
          description: Docker image for the provisioner
        provisionerImageTag:
          type: string
          description: Docker tag for the provisioner image
        deploymentMode:
          type: string
          enum: ["basic", "secure", "compliant"]
          description: Deployment mode controlling the infrastructure networking tier
        enableLLMAccess:
          type: boolean
          description: Whether LLM/Bedrock access is enabled for processors on this node
        llmBaaAcknowledged:
          type: boolean
          description: Whether a BAA acknowledgement was provided when the node was created
        maxGpuInstances:
          type: integer
          description: Maximum number of GPU EC2 instances (0 = GPU disabled)
        gpuTier:
          type: string
          description: "GPU instance tier: small (T4 16GB), medium (L4 24GB), large (A10G 24GB), xlarge (L40S 48GB)"
          enum: [small, medium, large, xlarge]
        maxInteractiveSessions:
          type: integer
          description: Maximum concurrent interactive (Jupyter) sessions (0 = interactive disabled)
        status:
          type: string
          enum: ["Enabled", "Paused", "Pending", "Destroying"]
          description: Current status of the compute node
    computeNodeUpdateRequest:
      type: object
      properties:
        workflowManagerTag:
          type: string
          description: Docker tag for the workflow manager (optional - only for legacy provisioner)
        workflowManagerCpu:
          type: integer
          description: CPU units for the workflow manager (optional - only for legacy provisioner)
        workflowManagerMemory:
          type: integer
          description: Memory (MB) for the workflow manager (optional - only for legacy provisioner)
        authorizationType:
          type: string
          enum: ["NONE", "AWS_IAM"]
          description: Authorization type for the API Gateway (optional - only for legacy provisioner)
        provisionerImage:
          type: string
          description: Docker image for the provisioner (optional - must be whitelisted)
        provisionerImageTag:
          type: string
          description: Docker tag for the provisioner image (optional - defaults to 'latest')
        deploymentMode:
          type: string
          enum: ["basic", "secure", "compliant"]
          description: Deployment mode controlling the infrastructure networking tier (optional)
        maxInteractiveSessions:
          type: integer
          minimum: 0
          description: Enable/disable interactive (Jupyter) sessions on an existing node. >0 enables (re-applies shared ALB + DNS); 0 disables. Omit to leave unchanged.
    updateConfigRequest:
      type: object
      description: Infrastructure configuration update. At least one field must be provided. Triggers re-provisioning.
      properties:
        maxGpuInstances:
          type: integer
          description: Maximum number of GPU EC2 instances. Set to 0 to disable GPU support.
          minimum: 0
        gpuTier:
          type: string
          description: "GPU instance tier: small (T4 16GB), medium (L4 24GB), large (A10G 24GB), xlarge (L40S 48GB)"
          enum: [small, medium, large, xlarge]
        enableLLMAccess:
          type: boolean
          description: Enable or disable LLM/Bedrock access for processors
    computeNodePermissionsRequest:
      type: object
      required:
        - accessScope
      properties:
        accessScope:
          type: string
          enum: ["private", "workspace", "shared"]
          description: |
            Access scope level for the compute node:
            - private: Only the owner can access
            - workspace: All workspace members can access
            - shared: Specific users and/or teams can access
        sharedWithUsers:
          type: array
          items:
            type: string
          description: List of user IDs to share with (only used when accessScope is "shared")
        sharedWithTeams:
          type: array
          items:
            type: string
          description: List of team IDs to share with (only used when accessScope is "shared")
    computeNodePermissionsResponse:
      type: object
      properties:
        nodeUuid:
          type: string
          description: UUID of the compute node
        accessScope:
          type: string
          enum: ["private", "workspace", "shared"]
          description: Current access scope level
        owner:
          type: string
          description: User ID of the node owner
        sharedWithUsers:
          type: array
          items:
            type: string
          description: List of user IDs the node is shared with
        sharedWithTeams:
          type: array
          items:
            type: string
          description: List of team IDs the node is shared with
        organizationId:
          type: string
          description: Organization ID for workspace access scope
    computeNodeAccessScopeRequest:
      type: object
      required:
        - accessScope
      properties:
        accessScope:
          type: string
          enum: ["private", "workspace", "shared"]
          description: |
            Access scope level for the compute node:
            - private: Only the owner can access
            - workspace: All workspace members can access
            - shared: Specific users and/or teams can access (existing shared access remains)
    grantUserAccessRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          description: ID of the user to grant access to
    grantTeamAccessRequest:
      type: object
      required:
        - teamId
      properties:
        teamId:
          type: string
          description: ID of the team to grant access to
    permissionActionResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
        nodeUuid:
          type: string
          description: UUID of the compute node
        action:
          type: string
          description: Action performed (granted/revoked)
        entityType:
          type: string
          enum: ["user", "team"]
          description: Type of entity the action was performed on
        entityId:
          type: string
          description: ID of the entity the action was performed on
    secretsRequest:
      type: object
      required:
        - secrets
      properties:
        secrets:
          type: object
          additionalProperties:
            type: string
          description: |
            Key-value map of secrets to store. Keys must match [A-Za-z_][A-Za-z0-9_]*.
            Maximum 50 secrets, key max 256 chars, value max 10000 chars.
            System-reserved key names (e.g. SESSION_TOKEN, DATASET_ID) are rejected.
    nodeConfigRequest:
      type: object
      properties:
        stuckTaskThresholdHours:
          type: integer
          description: |
            Number of hours after which a running ECS task is flagged as
            potentially stuck in health checks. Default: 8.
          example: 8
    nodeConfigResponse:
      type: object
      properties:
        stuckTaskThresholdHours:
          type: integer
          description: |
            Number of hours after which a running ECS task is flagged as
            potentially stuck in health checks.
          example: 8
    allowedProcessorsRequest:
      type: object
      required:
        - processors
      properties:
        processors:
          type: array
          items:
            type: string
          description: |
            List of allowed processor source URL patterns. Each entry is a source
            URL (e.g. "git://github.com/org/repo:v1"). Exact match, or omit the
            tag to allow any version (e.g. "git://github.com/org/repo").
            An empty array means all processors are allowed (open mode).
            Data targets and service processors are always allowed regardless of this list.
    chatUserQuotaRequest:
      type: object
      description: |
        Cost ceilings applied to chat and workflow LLM spend for a single user on this
        compute node. The compute node owner pays for LLM usage on their node, so they
        set these limits to bound per-user spend.

        **Fallback resolution (axis-by-axis):** any axis omitted (or set to null) on a
        per-user row falls back to the node's `__default__` row for that axis. Any axis
        still unset there falls back to a small **platform safety cap** baked into
        chat-service config — so unset axes are never "unlimited". Owners raise limits
        by writing `__default__` (node-wide) or by writing a per-user row with higher
        numbers.
      properties:
        dailyCostUsd:
          type: number
          format: double
          nullable: true
          description: |
            Maximum LLM spend (USD) per UTC day for this user on this node. Null/omitted
            falls back to the node `__default__` row, then to the platform safety cap.
          example: 5.00
        monthlyCostUsd:
          type: number
          format: double
          nullable: true
          description: |
            Maximum LLM spend (USD) per UTC calendar month for this user on this node.
            Null/omitted falls back to `__default__`, then to the platform safety cap.
          example: 50.00
        perWorkflowUsd:
          type: number
          format: double
          nullable: true
          description: |
            Maximum LLM spend (USD) any single workflow invocation by this user may
            incur. Forwarded to the LLM governor as the per-execution budget.
            Null/omitted falls back to `__default__`, then to the platform safety cap.
          example: 2.00
        notes:
          type: string
          description: Free-text notes (e.g. why this user has a custom limit).
    chatUserQuota:
      type: object
      description: |
        A per-(user, compute-node) cost ceiling. A row with userId == "__default__"
        is the node-wide default applied to any user without an explicit override.
      properties:
        computeNodeId:
          type: string
          description: UUID of the compute node this quota applies to.
        userId:
          type: string
          description: |
            Pennsieve user node id, or the literal string "__default__" for the
            node-wide default row.
        dailyCostUsd:
          type: number
          format: double
          nullable: true
        monthlyCostUsd:
          type: number
          format: double
          nullable: true
        perWorkflowUsd:
          type: number
          format: double
          nullable: true
        notes:
          type: string
        updatedBy:
          type: string
          description: User node id of the last writer.
        updatedAt:
          type: string
          format: date-time
    chatUserUsage:
      type: object
      description: |
        Aggregate LLM cost & token counts for a single (user, compute-node) pair over
        a single time bucket (day or month).
      properties:
        userNodeDate:
          type: string
          description: |
            Composite key: "{userId}#{computeNodeId}#YYYY-MM-DD" for daily aggregates,
            "{userId}#{computeNodeId}#YYYY-MM" for monthly.
        userId:
          type: string
        computeNodeId:
          type: string
        period:
          type: string
          enum: [day, month]
        totalInputTokens:
          type: integer
          format: int64
        totalOutputTokens:
          type: integer
          format: int64
        estimatedCostUsd:
          type: number
          format: double
        requestCount:
          type: integer
          format: int64
        lastModel:
          type: string
        updatedAt:
          type: string
          format: date-time
        expiresAt:
          type: integer
          format: int64
          description: Unix-epoch TTL after which this row is swept (default 90 days).
    chatUserEffectiveQuota:
      type: object
      description: |
        Resolved chat & workflow LLM cost limits for a single (user, compute-node) pair,
        with per-axis source attribution and current spend. Computed as:

          per-user row → node `__default__` row → platform safety cap

        axis-by-axis (any unset axis on a higher tier falls through to the next).
      properties:
        computeNodeId:
          type: string
        userId:
          type: string
        dailyCostUsd:
          type: number
          format: double
          description: Effective daily cap (USD) after fallback resolution.
        monthlyCostUsd:
          type: number
          format: double
          description: Effective monthly cap (USD) after fallback resolution.
        perWorkflowUsd:
          type: number
          format: double
          description: Effective per-workflow cap (USD) after fallback resolution.
        dailySource:
          type: string
          enum: [user, node-default, platform-safety]
          description: Which tier supplied the daily limit.
        monthlySource:
          type: string
          enum: [user, node-default, platform-safety]
          description: Which tier supplied the monthly limit.
        perWorkflowSource:
          type: string
          enum: [user, node-default, platform-safety]
          description: Which tier supplied the per-workflow limit.
        dailySpentUsd:
          type: number
          format: double
          description: Current UTC-day LLM spend on this compute node.
        monthlySpentUsd:
          type: number
          format: double
          description: Current UTC-month LLM spend on this compute node.
        remainingDayUsd:
          type: number
          format: double
          description: max(0, dailyCostUsd - dailySpentUsd).
        remainingMonthUsd:
          type: number
          format: double
          description: max(0, monthlyCostUsd - monthlySpentUsd).
        dailyTokens:
          type: integer
          format: int64
          description: |
            Total LLM tokens (input + output) used today on this compute node.
            Provided for display purposes — enforcement is dollar-based. Useful
            for a less in-your-face usage caption ("28k tokens today") than
            dollar amounts on every chat turn.
        monthlyTokens:
          type: integer
          format: int64
          description: |
            Total LLM tokens (input + output) used this calendar month on this
            compute node. Same display-only role as dailyTokens.
  responses:
    Unauthorized:
      description: Incorrect authentication or user has incorrect permissions.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Error:
      description: Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
paths:
  /interactive/jwks:
    get:
      summary: Public JWKS for interactive-session signing keys
      description: >-
        Returns the broker's public keys (RFC 7517) used to verify interactive
        (Jupyter) session tokens by kid. Intentionally UNAUTHENTICATED — it
        exposes only public key material; the per-node auth-proxy sidecars fetch
        it to verify broker-signed tokens.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getInteractiveJwks
      tags:
        - Interactive
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
  /gpu-tiers:
    get:
      summary: List available GPU instance tiers
      description: Returns the available GPU instance tiers with specs and pricing. Use this to populate tier selection UI when creating or updating compute nodes.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getGPUTiers
      security:
        - token_workspace_auth: [ ]
      tags:
        - Compute Nodes
      responses:
        '200':
          description: List of GPU tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tier:
                      type: string
                      description: Tier label used in API requests
                    instanceType:
                      type: string
                      description: AWS EC2 instance type
                    gpu:
                      type: string
                      description: GPU model name
                    gpuMemoryGB:
                      type: integer
                      description: GPU VRAM in GB
                    vcpus:
                      type: integer
                      description: Number of vCPUs
                    memoryGB:
                      type: integer
                      description: Instance RAM in GB
                    pricePerHour:
                      type: number
                      description: On-demand price per hour (USD, us-east-1)
  /accounts/{uuid}/workspaces:
    post:
      summary: Enable a workspace for an account
      description: |
        Enables a workspace for a specific compute resource account. The isPublic flag determines
        who can create compute nodes on this account: if true, workspace managers can create nodes;
        if false, only the account owner can create nodes
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: postAccountWorkspaceEnablement
      security:
        - token_workspace_auth: [ ]
      tags:
        - Account
      parameters:
        - in: path
          name: uuid
          required: true
          schema:
            type: string
          description: The uuid of the compute resource account
        - in: query
          name: organization_id
          schema:
            type: string
          required: true
          description: Node Id of the workspace that we want to enable.
      requestBody:
        description: Workspace enablement configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workspaceEnablementRequest'
      responses:
        '201':
          description: Successfully enabled workspace for account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workspaceEnablementResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /accounts/{uuid}/workspaces/{workspaceId}:
    delete:
      summary: Disable a workspace for an account
      description: |
        Disables a workspace for a specific compute resource account
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: deleteAccountWorkspaceEnablement
      security:
        - token_auth: [ ]
      tags:
        - Account
      parameters:
        - in: path
          name: uuid
          required: true
          schema:
            type: string
          description: The uuid of the compute resource account
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
          description: The workspace ID to disable
      responses:
        '204':
          description: Successfully disabled workspace for account
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /accounts:
    post:
      summary: Registers an external compute resource account
      description: |
        Registers an external compute resource (such as AWS). This method assumes that this account has a role that
        the Pennsieve platform can assume to deploy infrastructure for the compute nodes.
        The Pennsieve Agent handles the creation of this role.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: postAccounts
      security:
        - token_auth: [ ]
      tags:
        - Account
      requestBody:
        description: Payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/accountRequest'
      responses:
        '201':
          description: Successfully created compute resource account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/postAccountsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Unprocessable Entity - Account already exists for this user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "PostAccountsHandler: error records exists"
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      summary: Get account details for the authenticated user
      description: |
        Get account details for compute resources belonging to the authenticated user.
        Optionally filter by workspace or include workspace enablement details.

        When filtering by workspace, workspace administrators (permission_bit >= 16) will also
        see accounts with isPublic=true that they don't own, enabling them to create and manage
        compute nodes on those accounts.
      parameters:
        - in: query
          name: organization_id
          schema:
            type: string
          required: false
          description: Filter accounts by organization ID (only returns accounts enabled for this organization). Admins will also see public accounts (isPublic=true) they don't own.
        - in: query
          name: includeWorkspaces
          schema:
            type: string
            enum: ["true", "false"]
          required: false
          description: Include workspace enablement details in the response
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getAccounts
      security:
        - token_auth: [ ]
      tags:
        - Account
      responses:
        '200':
          description: The requested compute resource accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/accountsGetResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /accounts/{id}:
    get:
      summary: Get account details for a specific compute resource
      description: |
        Get account details for a specific compute resource
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getAccount
      security:
        - token_auth: [ ]
      tags:
        - Account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The uuid of the compute resource account
      responses:
        '200':
          description: The requested compute resource account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accountsGetResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    patch:
      summary: Update account details
      description: |
        Partially update the status, name, and/or description of a specific compute resource account. Setting the status
        to PAUSED will disable the use of the account for analytic workflows and all compute nodes on this account. This does not affect storage functions.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: patchAccount
      security:
        - token_auth: [ ]
      tags:
        - Account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The uuid of the compute resource account
      requestBody:
        description: Account update payload
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: ["Enabled", "Paused"]
                  description: The new status for the account
                name:
                  type: string
                  description: The new name for the account
                description:
                  type: string
                  description: The new description for the account
      responses:
        '200':
          description: Successfully updated account status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accountsGetResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete a compute resource account
      description: |
        Delete a compute resource account and its workspace enablements. Must be the account owner.
        If the account has active compute nodes, the request will fail with a 409 Conflict unless
        the force query parameter is set to true.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: deleteAccount
      security:
        - token_auth: [ ]
      tags:
        - Account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The uuid of the compute resource account
        - in: query
          name: force
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: If true, delete even if account has active compute nodes
      responses:
        '200':
          description: The deleted account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accountsGetResponse'
        '409':
          description: Account has active compute nodes
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes:
    post:
      summary: Create a new compute node
      description: |
        Creates a new compute node for running analytical workflows. This will provision the necessary
        infrastructure in the specified account including ECS tasks, API Gateway, EFS storage, and SQS queues.
        If organization_id is provided, the node will be created within that workspace context.
        If organization_id is omitted, an organization-independent (private) node will be created.

        **Permissions:** Account owner can always create nodes. On public accounts (isPublic=true),
        workspace administrators (permission_bit >= 16) can also create nodes.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: postComputeNodes
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      requestBody:
        description: Compute node configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/computeNodeRequest'
      responses:
        '201':
          description: Successfully created compute node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodeResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      summary: List compute nodes
      description: |
        Lists compute nodes accessible to the authenticated user based on access control rules:
        
        **When account_owner=true:**
        - Returns ALL compute nodes on accounts owned by the authenticated user
        - Bypasses individual node permissions and workspace filtering
        - Only works if the user owns at least one compute resource account
        - Useful for billing, management, and auditing purposes
        
        **When no organization_id is provided (normal mode):**
        - Returns only compute nodes owned by the user (organization-independent nodes)
        - These are private nodes created without a workspace context
        
        **When organization_id is provided (normal mode):**
        - Returns nodes accessible to the user within that specific workspace
        - Includes nodes shared with the user directly, through teams, or workspace-wide access
        - Only returns nodes that belong to the specified organization
        
        All responses (except account owner mode) respect the user's actual permissions and access control settings.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getComputeNodes
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: query
          name: organization_id
          schema:
            type: string
          required: false
          description: |
            Workspace ID to filter nodes by. When provided, returns nodes accessible to the user within that workspace.
            When omitted, returns only user-owned organization-independent (private) nodes.
            Ignored when account_owner=true.
        - in: query
          name: account_owner
          schema:
            type: boolean
          required: false
          description: |
            When set to true, returns ALL compute nodes on accounts owned by the authenticated user,
            regardless of individual node permissions or workspace context. Only works if the user 
            is an account owner. Overrides organization_id filtering when true.
            
            This is useful for account owners who need to see all infrastructure deployed 
            on their accounts for billing, management, or auditing purposes.
      responses:
        '200':
          description: List of compute nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/computeNodeResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}:
    get:
      summary: Get compute node details
      description: |
        Retrieves detailed information about a specific compute node.

        **Permissions:** Accessible by node owner, users with shared access (direct, team, or workspace scope),
        and workspace administrators on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getComputeNode
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      responses:
        '200':
          description: Compute node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    put:
      summary: Update compute node configuration
      description: |
        Updates the configuration of an existing compute node, such as workflow manager settings
        or authorization type.

        **Permissions:** Node owner, account owner, or workspace administrator on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: putComputeNode
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      requestBody:
        description: Compute node update configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/computeNodeUpdateRequest'
      responses:
        '200':
          description: Successfully updated compute node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    patch:
      summary: Update compute node details
      description: |
        Partially update the status, name, and/or description of a specific compute node.
        Setting the status to PAUSED will disable the compute node for analytic workflows.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: patchComputeNode
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      requestBody:
        description: Compute node update payload
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: ["Enabled", "Paused"]
                  description: The new status for the compute node
                name:
                  type: string
                  description: The new name for the compute node
                description:
                  type: string
                  description: The new description for the compute node
      responses:
        '200':
          description: Successfully updated compute node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete a compute node
      description: |
        Deletes a compute node and all its associated infrastructure. This will terminate running tasks,
        delete the API Gateway, EFS storage, and SQS queues.

        **Permissions:** Node owner, account owner, or workspace administrator on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: deleteComputeNode
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node to delete
      responses:
        '204':
          description: Successfully deleted compute node
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/update-config:
    post:
      summary: Update compute node infrastructure configuration
      description: |
        Updates infrastructure-affecting configuration (GPU settings, LLM access) and triggers
        re-provisioning. Only fields included in the request body are changed. The node's status
        must be "Enabled" or "Paused" (not "Pending" or "Destroying").

        **Permissions:** Node owner, account owner, or workspace administrator on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: postUpdateConfig
      security:
        - token_auth: [ ]
      tags:
        - compute-nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateConfigRequest'
      responses:
        '202':
          description: Config updated, re-provisioning initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Bad request (invalid values or node in wrong state)
        '403':
          description: Forbidden (not node owner, account owner, or workspace administrator on public account)
        '404':
          description: Compute node not found
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/permissions:
    get:
      summary: Get compute node permissions
      description: |
        Retrieves the current permission settings for a compute node.

        **Permissions:** Accessible by node owner, users with shared access (direct, team, or workspace scope),
        and workspace administrators on public accounts (isPublic=true).
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: getComputeNodePermissions
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      responses:
        '200':
          description: Current permission settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodePermissionsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    put:
      summary: Set compute node access scope
      description: |
        Sets the access scope for a compute node.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
        
        Access scope levels:
        - **private**: Only the owner can access the node  
        - **workspace**: All members of the workspace can access the node
        - **shared**: Maintains existing user/team sharing but removes workspace access if any (use POST endpoints to add new shares)
        
        Note: When setting to "shared", existing individual user and team permissions are preserved.
        Use the granular POST/DELETE endpoints on /permissions/users and /permissions/teams to manage specific access grants.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: setComputeNodeAccessScope
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      requestBody:
        description: Access scope configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/computeNodeAccessScopeRequest'
      responses:
        '200':
          description: Successfully updated access scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/computeNodePermissionsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/permissions/users:
    post:
      summary: Grant access to a user
      description: |
        Grants access to a specific user for a compute node.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
        
        **Important**: This operation is only available for compute nodes that belong to a workspace (organization).
        Independent compute nodes cannot be shared with users or teams.
        
        This will automatically set the node's access scope to "shared" if it's currently "private" or "workspace".
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: grantUserAccess
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
      requestBody:
        description: User to grant access to
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/grantUserAccessRequest'
      responses:
        '201':
          description: Successfully granted access to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/permissionActionResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/permissions/users/{userId}:
    delete:
      summary: Revoke access from a user
      description: |
        Revokes access from a specific user for a compute node.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
        Cannot revoke access from the node owner.
        
        **Note**: This operation only applies to compute nodes that belong to a workspace (organization).
        Independent compute nodes do not support sharing.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/account-service'
      operationId: revokeUserAccess
      security:
        - token_auth: [ ]
      tags:
        - Compute Nodes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the compute node
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: The ID of the user to revoke access from
      responses:
        '200':
          description: Successfully revoked access from user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/permissionActionResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /compute-nodes/{id}/permissions/teams:
    post:
      summary: Grant access to a team
      description: |
        Grants access to a specific team for a compute node.

        **Permissions:** Node owner or workspace administrator on public accounts (isPublic=true).
        
        **Important**: This operation is only available for compute nodes that belong to a workspace (organization).

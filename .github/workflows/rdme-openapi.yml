name: ReadMe GitHub Action 🦉

on:
  push:
    branches:
      # This workflow will run every time you push code to the following branch: `main`
      # Check out GitHub's docs for more info on configuring this:
      # https://docs.github.com/actions/using-workflows/events-that-trigger-workflows
      - main

jobs:
  rdme-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo 📚
        uses: actions/checkout@v4
      - name: Find and Replace
        uses: jacobtomlinson/gha-find-replace@master
        with:
          find: "Unused"
          replace: "Authorization"
          include: "terraform/packages-service.yml"
      - name: Strip internal endpoints
        uses: mikefarah/yq@master
        with:
          cmd: yq 'del(.paths[][] | select(.x-internal == true)) | del(.paths[] | select(length == 0))' terraform/accounts-service.yml > terraform/accounts-service-public.yml
      - name: Run `openapi` command 🚀
        uses: readmeio/rdme@v9
        with:
          rdme: openapi terraform/accounts-service-public.yml --key=${{ secrets.README_API_KEY }} --id=696e4ddb3484eaed427370f3
